version: '3.8'

services:
  monitor:
    build: .
    container_name: greedy-shark-monitor
    command: python monitor_stream.py
    volumes:
      - ./.grace_period_until:/app/.grace_period_until
      - ./.auto_suspended_streamers:/app/.auto_suspended_streamers
      - ./.monitor_state:/app/.monitor_state
    env_file:
      - .env
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('.monitor_state') and os.path.getmtime('.monitor_state') > __import__('time').time() - 120 else 1)"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s

  bot:
    build: .
    container_name: greedy-shark-bot
    command: python grace_period_bot.py
    volumes:
      - ./.grace_period_until:/app/.grace_period_until
      - ./.auto_suspended_streamers:/app/.auto_suspended_streamers
      - ./.monitor_state:/app/.monitor_state
    env_file:
      - .env
    restart: unless-stopped
    network_mode: host
    depends_on:
      - monitor
    healthcheck:
      test: ["CMD", "pgrep", "-f", "grace_period_bot.py"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  greedy-shark-network:
    driver: bridge
