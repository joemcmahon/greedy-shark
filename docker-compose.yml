version: '3.8'

services:
  monitor:
    build: .
    container_name: greedy-shark-monitor
    command: python monitor_stream.py
    volumes:
      - ./.grace_period_until:/app/.grace_period_until
      - ./.auto_suspended_streamers:/app/.auto_suspended_streamers
      - ./.monitor_state:/app/.monitor_state
    env_file:
      - .env
    restart: unless-stopped
    network_mode: host

  bot:
    build: .
    container_name: greedy-shark-bot
    command: python grace_period_bot.py
    volumes:
      - ./.grace_period_until:/app/.grace_period_until
      - ./.auto_suspended_streamers:/app/.auto_suspended_streamers
      - ./.monitor_state:/app/.monitor_state
    env_file:
      - .env
    restart: unless-stopped
    network_mode: host
    depends_on:
      - monitor

networks:
  greedy-shark-network:
    driver: bridge
